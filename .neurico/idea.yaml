idea:
  title: Can LLMs zero-shot max entropy questions?
  domain: nlp
  hypothesis: 'Large language models can, in a zero-shot setting, generate yes/no
    questions that split a given set (e.g., a list of fruits) into two groups of equal
    or nearly equal size; however, there may exist sets for which LLMs find this task
    difficult.

    '
  background:
    description: 'If you give a model a set of things, e.g., fruits:

      Apple

      Mango

      Strawberry

      Pineapple

      Blueberry

      Can it generate a yes/no question that splits the set into half or very close?
      Are there sets for which LLMs find this difficult?

      '
  metadata:
